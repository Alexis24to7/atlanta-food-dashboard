<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWA Atlas</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    
    <style>
        :root { --fwa-green: #2e7d32; --sidebar-white: #ffffff; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* 1. Sidebar Layout */
        #sidebar { width: 350px; background: var(--sidebar-white); border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #eee; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--fwa-green); cursor: pointer; }

        /* 2. Tab Navigation Buttons */
        .nav-tabs { display: flex; padding: 15px 25px; gap: 10px; border-bottom: 1px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: #f0f2f0; border-radius: 8px; cursor: pointer; font-weight: 600; color: #555; transition: 0.3s; }
        .tab-btn.active { background: var(--fwa-green); color: white; box-shadow: 0 4px 10px rgba(46,125,50,0.2); }

        /* 3. Section Content */
        .tab-content { padding: 25px; flex-grow: 1; overflow-y: auto; display: none; }
        .active-section { display: block; }

        /* 4. Map View */
        #map { flex-grow: 1; height: 100%; }

        /* Layer Toggle Menu */
        #menu { position: absolute; background: #fff; padding: 10px; border-radius: 8px; top: 10px; right: 10px; z-index: 1; border: 1px solid #ccc; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="logo">🌿 FWA ATLAS</div>
    </div>
    
    <div class="nav-tabs">
        <button class="tab-btn active" id="btn-home" onclick="showTab('home')">Home</button>
        <button class="tab-btn" id="btn-map" onclick="showTab('map-info')">Map Info</button>
        <button class="tab-btn" id="btn-guide" onclick="showTab('guide')">Guide</button>
    </div>

    <div id="home" class="tab-content active-section">
        <h2>Welcome</h2>
        <p>This dashboard serves as the central hub for the Food Well Alliance garden network across Georgia.</p>
    </div>

    <div id="map-info" class="tab-content">
        <h2>Nearby Gardens</h2>
        <div id="location-list">
            <p style="color:#666">Click a point on the map to see specific garden details here.</p>
        </div>
    </div>

    <div id="guide" class="tab-content">
        <h2>Resource Guide</h2>
        <p><b>Tools:</b> Rent from Atlanta ToolBank.</p>
        <p><b>Compost:</b> Delivery available statewide.</p>
    </div>
</div>

<div id="map"></div>

<script>
    // TO MAKE THIS WORK: Replace with your token from your Mapbox account
    mapboxgl.accessToken = 'pk.eyJ1IjoiYWxleGlzMjR0bzciLCJhIjoiY21vMHk0YXBwMGQ1MTJzb2dyNHFhbGgwMSJ9.lJlOg18FfjTPvBdSUXd5OA'; // Paste your actual token here

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11', // Clean professional style
        center: [-83.5, 32.7], // Centers perfectly on GEORGIA
        zoom: 6.5,
        pitch: 45 // 3D Tilt
    });

    // 1. Tab Switching Function
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active-section'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active-section');
        document.getElementById('btn-' + (tabId === 'map-info' ? 'map' : tabId)).classList.add('active');
    }

    // 2. Add Points (Gardens)
    map.on('load', () => {
        // Example Garden Point
        new mapboxgl.Marker({ color: '#2e7d32' })
            .setLngLat([-84.4225, 33.7846])
            .setPopup(new mapboxgl.Popup().setHTML("<b>FWA Headquarters</b><br>Atlanta, GA"))
            .addTo(map);

        // 3D Buildings Layer
        map.addLayer({
            'id': '3d-buildings',
            'source': 'composite',
            'source-layer': 'building',
            'filter': ['==', 'extrude', 'true'],
            'type': 'fill-extrusion',
            'minzoom': 15,
            'paint': {
                'fill-extrusion-color': '#aaa',
                'fill-extrusion-height': ['get', 'height'],
                'fill-extrusion-opacity': 0.6
            }
        });
    });
</script>

</body>
</html>
