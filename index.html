<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWA Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --fwa-green: #2e7d32;
            --fwa-dark: #1b5e20;
            --light-bg: #f0f2f0;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; background-color: var(--light-bg); color: #333;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            height: 70px; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.4rem; font-weight: 800; color: var(--fwa-green); cursor: pointer; text-decoration: none; }
        .nav-tabs { display: flex; gap: 5px; }
        
        .tab-btn {
            background: none; border: none; padding: 10px 20px;
            font-size: 0.9rem; font-weight: 600; color: #555; cursor: pointer;
            border-radius: 8px; transition: 0.2s;
        }

        .tab-btn.active { background: var(--fwa-green); color: white; box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3); }

        .content-section { display: none; padding: 30px 5%; animation: fadeIn 0.3s; }
        .active-section { display: block; }

        /* The 3D-ish Map Container */
        #map-wrapper {
            perspective: 1000px; /* Gives a sense of depth */
            margin-top: 20px;
        }

        #map-container {
            background: white; 
            padding: 10px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); /* Deep shadow for 3D pop */
            transform: rotateX(2deg); /* Subtle tilt */
            border: 1px solid rgba(0,0,0,0.05);
        }

        #map { 
            height: 70vh; /* Fixed height so it loads! */
            width: 100%; 
            border-radius: 15px; 
        }

        .card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <a class="logo" onclick="showSection('home')">🌿 FWA Dashboard</a>
    <div class="nav-tabs">
        <button class="tab-btn" id="btn-map" onclick="showSection('map-tab')">Map</button>
        <button class="tab-btn" id="btn-guide" onclick="showSection('guide')">Guide</button>
    </div>
</header>

<div id="home" class="content-section active-section">
    <div style="text-align: center; padding: 40px 0;">
        <h1 style="font-size: 3rem; color: var(--fwa-dark); margin-bottom: 10px;">Locally Grown.</h1>
        <p style="font-size: 1.2rem; color: #666;">Empowering Atlanta's urban growers since 2015.</p>
    </div>
</div>

<div id="map-tab" class="content-section">
    <div id="map-wrapper">
        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>
</div>

<div id="guide" class="content-section">
    <h1>FWA Resource Guide</h1>
    <div class="card">
        <h3>🛠 Tool Lending Hub</h3>
        <p>Located at the Atlanta ToolBank. Complete your BCS training to start renting.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    function showSection(sectionId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(sectionId).classList.add('active-section');
        
        if(sectionId !== 'home') {
            const btnId = sectionId === 'map-tab' ? 'btn-map' : 'btn-guide';
            document.getElementById(btnId).classList.add('active');
        }

        if(sectionId === 'map-tab') {
            // This line fixes the "gray map" or "non-loading map" issue
            setTimeout(() => { map.invalidateSize(); }, 300);
        }
    }

    // Initialize Map with a cleaner, high-detail "3D-friendly" tile
    var map = L.map('map', {
        scrollWheelZoom: false // Prevents accidental scrolling while browsing the site
    }).setView([33.7490, -84.3880], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // FWA Points
    L.marker([33.7846, -84.4225]).addTo(map).bindPopup('<b>FWA Headquarters</b>');
    L.marker([33.7431, -84.3725]).addTo(map).bindPopup('<b>Atlanta ToolHub</b>');
</script>

</body>
</html>
